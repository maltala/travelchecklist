{% extends 'trips/base.html' %}

{% block title %}Registro | TravelChecklist{% endblock %}

{% block content %}
  <div class="card">
    <h1>Crear cuenta</h1>
    <p class="muted">Django ya trae un formulario básico de registro.</p>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Registrarme</button>
    </form>
  </div>
{% endblock %}
